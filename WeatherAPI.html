<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Professional Weather</title>
    <style>
        :root {
            --bg-clear: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --bg-cloudy: linear-gradient(135deg, #606c88 0%, #3f4c6b 100%);
            --bg-rain: linear-gradient(135deg, #203a43 0%, #2c5364 100%);
            --bg-default: linear-gradient(135deg, #1e3c72, #2a5298);
            --glass: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-default);
            transition: background 0.8s ease;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* Improved Search Bar */
        .search-box {
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 5px;
            border-radius: 50px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }

        .search-box:focus-within {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            padding: 12px 25px;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 16px;
        }

        input::placeholder { color: rgba(255,255,255,0.8); }

        button {
            padding: 10px 25px;
            border-radius: 40px;
            border: none;
            background: #fff;
            color: #1e3c72;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }

        button:hover { transform: scale(1.02); background: #f0f0f0; }

        /* Weather Card Enhancements */
        .weather-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            display: none; /* Hidden until search */
        }

        .weather-card.active {
            display: block;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .temp-container {
            font-size: 90px;
            font-weight: 800;
            margin: 15px 0;
            line-height: 1;
        }

        .unit { font-size: 40px; font-weight: 300; vertical-align: top; }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .col {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Search city..." autofocus>
            <button id="searchBtn">Search</button>
        </div>

        <div id="loader" class="loading-spinner"></div>

        <div class="weather-card" id="weatherCard">
            <h2 id="cityName">--</h2>
            <p id="date">--</p>
            
            <div class="temp-container">
                <span id="temperature">--</span><span class="unit">°C</span>
            </div>
            
            <p id="description">--</p>
            
            <div class="details">
                <div class="col">
                    <span style="font-size: 12px; opacity: 0.7;">HUMIDITY</span>
                    <div id="humidity" style="font-size: 20px; font-weight: 600;">--%</div>
                </div>
                <div class="col">
                    <span style="font-size: 12px; opacity: 0.7;">WIND SPEED</span>
                    <div id="wind" style="font-size: 20px; font-weight: 600;">-- km/h</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEATHER_CONFIG = {
            0: { desc: "Clear Sky", bg: "var(--bg-clear)" },
            1: { desc: "Mainly Clear", bg: "var(--bg-clear)" },
            2: { desc: "Partly Cloudy", bg: "var(--bg-cloudy)" },
            3: { desc: "Overcast", bg: "var(--bg-cloudy)" },
            45: { desc: "Foggy", bg: "var(--bg-cloudy)" },
            61: { desc: "Rainy", bg: "var(--bg-rain)" },
            95: { desc: "Thunderstorm", bg: "var(--bg-rain)" }
        };

        const elements = {
            input: document.getElementById('cityInput'),
            btn: document.getElementById('searchBtn'),
            card: document.getElementById('weatherCard'),
            loader: document.getElementById('loader'),
            temp: document.getElementById('temperature'),
            city: document.getElementById('cityName'),
            desc: document.getElementById('description'),
            hum: document.getElementById('humidity'),
            wind: document.getElementById('wind')
        };

        async function fetchWeather() {
            const city = elements.input.value.trim();
            if (!city) return;

            elements.loader.style.display = 'block';
            elements.card.classList.remove('active');

            try {
                // Geo-lookup
                const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
                const geoData = await geoRes.json();

                if (!geoData.results) throw new Error("City not found");

                const { latitude, longitude, name, country } = geoData.results[0];

                // Weather-fetch
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=auto`);
                const wData = await wRes.json();

                updateUI(wData.current, name, country);
            } catch (err) {
                alert(err.message);
            } finally {
                elements.loader.style.display = 'none';
            }
        }

        function updateUI(data, name, country) {
            const weather = WEATHER_CONFIG[data.weather_code] || { desc: "Variable", bg: "var(--bg-default)" };
            
            elements.city.innerText = `${name}, ${country}`;
            elements.temp.innerText = Math.round(data.temperature_2m);
            elements.desc.innerText = weather.desc;
            elements.hum.innerText = `${data.relative_humidity_2m}%`;
            elements.wind.innerText = `${data.wind_speed_10m} km/h`;
            
            // Dynamic Background
            document.body.style.background = weather.bg;
            
            elements.card.classList.add('active');
            elements.input.value = "";
        }

        elements.btn.addEventListener('click', fetchWeather);
        elements.input.addEventListener('keypress', (e) => e.key === 'Enter' && fetchWeather());

        // Set initial date
        document.getElementById('date').innerText = new Date().toLocaleDateString('en-US', { 
            weekday: 'long', month: 'short', day: 'numeric' 
        });
    </script>
</body>
</html>
